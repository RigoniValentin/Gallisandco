# ============================================================
# Nginx – gallisandco.com
# Reverse proxy para Next.js standalone corriendo en puerto 3019
#
# Copiar en el panel / directorio de vhosts del VPS
# ============================================================

# HTTP → HTTPS (redirige tanto www como apex)
server {
    listen 80;
    listen [::]:80;
    server_name gallisandco.com www.gallisandco.com;
    return 301 https://$host$request_uri;
}

# HTTPS – bloque principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gallisandco.com www.gallisandco.com;

    # ----- SSL (certificados del VPS) -----
    ssl_certificate     "/home/Certificados SSL/gallisandco.com.crt";
    ssl_certificate_key "/home/Certificados SSL/gallisandco.com.key";
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ----- Security headers -----
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ----- Assets estáticos de Next.js (_next/static) -----
    location /_next/static/ {
        alias /home/Gallisandco/.next/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ----- Videos y brand assets de la landing -----
    location /brand/ {
        alias /home/Gallisandco/public/brand/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ----- Archivos raíz del public (favicon, robots, sitemap) -----
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        root /home/Gallisandco/public;
        expires 30d;
        access_log off;
    }

    # ----- Resto de assets públicos -----
    location /_next/image {
        proxy_pass http://127.0.0.1:3019;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        root /home/Gallisandco/public;
        try_files $uri $uri/ =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # ----- Next.js app (SSR) → Node en puerto 3019 -----
    location / {
        proxy_pass          http://127.0.0.1:3019;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;
    }

    # ----- Gzip -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml;
}
